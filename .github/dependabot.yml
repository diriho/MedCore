version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      web-deps:
        patterns:
          - "*"
    labels:
      - dependencies
      - web

  - package-ecosystem: npm
    directory: /server
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      server-deps:
        patterns:
          - "*"
    labels:
      - dependencies
      - server

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
